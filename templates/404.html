<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <!--Base Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!--Navbar-->
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <!--My Stylesheet-->
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='main.css')}}">
  </head>
  <body>
    <!-- Navigation Bar -->
    {% include 'navbar.html' %}

    <div class="container mt-5 mb-5">
      <div class="row align-items-center">
        <div class="col-md-12">
          <h1>
            <span id="typewriter-text"></span><span class="blink-cursor"></span>
          </h1>
        </div>
      </div>
    </div>
    <!-- Footer -->
    <footer class="site-footer">
      {% include 'footer.html' %}
    </footer>
    
  <script>
    (async function () {
      var el = document.getElementById('typewriter-text');
      var text1 = "Uh Oh...";
      var text2 = " This page doesn't exist...";
      var text3 = "Try clicking something in the navigation bar above!";
      el.innerHTML = '';

      function type(text, typing_delay) {
        return new Promise((resolve) => {
          let i = 0;
          function step() {
            if (i < text.length) {
              el.innerHTML += text[i++];
              setTimeout(step, typing_delay);
            } else {
              resolve();
            }
          }
          setTimeout(step, 700);
        });
      }

      await type(text1, 50);
      await type(text2, 50);
      el.appendChild(document.createElement('br'));
      await type(text3, 25);
    })();
  </script>
  </body>
</html>
